<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIY Photo Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.284.0?external=react"
        }
    }
    </script>
    <style>
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-in {
            animation: slideIn 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="module">
        import React, { useState } from 'react';
        import ReactDOM from 'react-dom/client';
        import { 
            Camera, BatteryFull, Trash2, Smartphone, Plane, 
            Maximize, Focus, Moon, ChevronRight, ChevronLeft, 
            CheckCircle2, Aperture, SprayCan, ShieldAlert, Target 
        } from 'lucide-react';

        const steps = [
            {
                title: "Phase 1: Physical Prep",
                description: "Start with the hardware. A clean, powered phone is half the battle[cite: 2].",
                items: [
                    { icon: React.createElement(SprayCan, { className: "text-blue-500" }), label: "Wipe your lens", detail: "Use a microfiber cloth to prevent smudges[cite: 10]." },
                    { icon: React.createElement(BatteryFull, { className: "text-emerald-500" }), label: "Charge to 100%", detail: "Ensure your battery is fully charged before starting[cite: 8, 9]." },
                    { icon: React.createElement(Target, { className: "text-rose-500" }), label: "Set up the Tripod", detail: "Stability is key for a steady shot[cite: 12]." }
                ]
            },
            {
                title: "Phase 2: Digital Hygiene",
                description: "Clear the path for high-quality files and zero interruptions.",
                items: [
                    { icon: React.createElement(Trash2, { className: "text-red-500" }), label: "Clear Space", detail: "Clear out unnecessary files to make room for high-res photos[cite: 3, 7]." },
                    { icon: React.createElement(Plane, { className: "text-orange-500" }), label: "Airplane Mode", detail: "Put phones on airplane mode if you plan to shoot video[cite: 11]." }
                ]
            },
            {
                title: "Phase 3: Format & Resolution",
                description: "Tell your phone to prioritize quality over storage space.",
                items: [
                    { icon: React.createElement(Maximize, { className: "text-purple-500" }), label: "Max File Size", detail: "In Camera Settings, use the largest file size/resolution available[cite: 3]." },
                    { icon: React.createElement(Smartphone, { className: "text-indigo-500" }), label: "Use JPEG Format", detail: "Choose JPEG or the most widely compatible format offered[cite: 18, 23]." },
                    { icon: React.createElement(ShieldAlert, { className: "text-amber-500" }), label: "Disable Filters", detail: "Don't use any filters in the camera app[cite: 21]." }
                ]
            },
            {
                title: "Phase 4: Expert Techniques",
                description: "Simple tricks to make a phone photo look professional.",
                items: [
                    { icon: React.createElement(Aperture, { className: "text-pink-500" }), label: "Portrait Mode", detail: "Try Portrait mode for closeups of one to three people[cite: 20]." },
                    { icon: React.createElement(Focus, { className: "text-yellow-500" }), label: "Tap to Focus", detail: "Tap the subject to ensure the focus and exposure are correct[cite: 24]." }
                ]
            },
            {
                title: "Phase 5: Final Checks",
                description: "The final polish before you start the real shoot.",
                items: [
                    { icon: React.createElement(Moon, { className: "text-slate-700" }), label: "Night Mode", detail: "If the venue is dim, try Night Mode/Night Sight[cite: 25]." },
                    { icon: React.createElement(CheckCircle2, { className: "text-emerald-500" }), label: "Do a Test shot!", detail: "Review a test photo to check the shot before continuing[cite: 13, 14]." }
                ]
            }
        ];

        const App = () => {
            const [currentStep, setCurrentStep] = useState(0);
            const [completed, setCompleted] = useState(false);

            const step = steps[currentStep];
            const progress = ((currentStep + 1) / steps.length) * 100;

            if (completed) {
                return React.createElement('div', { className: "flex flex-col items-center justify-center min-h-screen bg-white p-6" },
                    React.createElement('div', { className: "max-w-sm w-full text-center space-y-6" },
                        React.createElement('div', { className: "w-24 h-24 bg-emerald-50 rounded-full flex items-center justify-center mx-auto border-2 border-emerald-100" },
                            React.createElement(CheckCircle2, { className: "w-12 h-12 text-emerald-600" })
                        ),
                        React.createElement('div', { className: "space-y-2" },
                            React.createElement('h1', { className: "text-3xl font-black text-slate-900" }, "You're All Set!"),
                            React.createElement('p', { className: "text-slate-500 text-lg" }, "Your phone is prepped for professional-grade DIY photos.")
                        ),
                        React.createElement('button', { 
                            onClick: () => { setCompleted(false); setCurrentStep(0); },
                            className: "w-full py-5 bg-slate-900 text-white rounded-2xl font-bold shadow-xl active:scale-95 transition-transform" 
                        }, "Review Tips Again")
                    )
                );
            }

            return React.createElement('div', { className: "flex flex-col min-h-screen font-sans text-slate-900" },
                React.createElement('header', { className: "bg-white px-6 pt-12 pb-6 border-b border-slate-100 sticky top-0 z-10" },
                    React.createElement('div', { className: "flex items-center justify-between mb-4" },
                        React.createElement('div', { className: "flex items-center gap-2" },
                            React.createElement('div', { className: "bg-slate-900 p-2 rounded-xl" }, React.createElement(Camera, { className: "w-5 h-5 text-white" })),
                            React.createElement('span', { className: "font-black text-xl tracking-tight" }, "DIY PHOTO PRO")
                        ),
                        React.createElement('div', { className: "px-3 py-1 bg-slate-100 rounded-full" },
                            React.createElement('span', { className: "text-[10px] font-black text-slate-500 uppercase" }, `STEP ${currentStep + 1} / ${steps.length}`)
                        )
                    ),
                    React.createElement('div', { className: "h-1.5 w-full bg-slate-100 rounded-full overflow-hidden" },
                        React.createElement('div', { className: "h-full bg-slate-900 transition-all duration-700", style: { width: `${progress}%` } })
                    )
                ),
                React.createElement('main', { className: "flex-1 p-6 max-w-lg mx-auto w-full pb-32" },
                    React.createElement('div', { className: "mb-10" },
                        React.createElement('h2', { className: "text-3xl font-black mb-3" }, step.title),
                        React.createElement('p', { className: "text-slate-500 text-lg font-medium" }, step.description)
                    ),
                    React.createElement('div', { className: "grid gap-4" },
                        step.items.map((item, idx) => 
                            React.createElement('div', { key: idx, className: "bg-white p-5 rounded-3xl shadow-sm border border-slate-200 flex items-start gap-5 animate-slide-in", style: { animationDelay: `${idx * 0.1}s` } },
                                React.createElement('div', { className: "w-14 h-14 rounded-2xl bg-slate-50 flex items-center justify-center shrink-0 border border-slate-100" }, item.icon),
                                React.createElement('div', null,
                                    React.createElement('h3', { className: "font-bold text-lg" }, item.label),
                                    React.createElement('p', { className: "text-slate-500 text-sm leading-relaxed" }, item.detail)
                                )
                            )
                        )
                    )
                ),
                React.createElement('footer', { className: "fixed bottom-0 left-0 right-0 p-6 bg-white/80 backdrop-blur-xl border-t border-slate-100 flex gap-4" },
                    currentStep > 0 && React.createElement('button', { 
                        onClick: () => setCurrentStep(currentStep - 1),
                        className: "w-16 h-16 flex items-center justify-center border-2 border-slate-200 rounded-2xl text-slate-500"
                    }, React.createElement(ChevronLeft, { size: 28 })),
                    React.createElement('button', { 
                        onClick: () => currentStep < steps.length - 1 ? setCurrentStep(currentStep + 1) : setCompleted(true),
                        className: "flex-1 h-16 bg-slate-900 text-white rounded-2xl font-black text-lg flex items-center justify-center gap-3 shadow-xl active:scale-95 transition-transform"
                    }, 
                        currentStep === steps.length - 1 ? "FINISH SETUP" : "CONTINUE",
                        React.createElement(ChevronRight, { size: 24 })
                    )
                )
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
