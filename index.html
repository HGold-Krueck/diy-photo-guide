<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIY Pro Photo Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.284.0?external=react"
        }
    }
    </script>
    <style>
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-in {
            animation: slideIn 0.4s ease-out forwards;
        }
        body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="module">
        import React, { useState } from 'react';
        import ReactDOM from 'react-dom/client';
        import { 
            Camera, BatteryFull, Trash2, Smartphone, Plane, 
            Maximize, Focus, Moon, ChevronRight, ChevronLeft, 
            CheckCircle2, Aperture, SprayCan
        } from 'lucide-react';

        // Service Worker for Offline access
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    const CACHE_NAME = 'diy-pro-v3';
                    const ASSETS = ['/', '/index.html', 'https://cdn.tailwindcss.com'];
                    self.addEventListener('install', (e) => e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(ASSETS))));
                    self.addEventListener('fetch', (e) => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                navigator.serviceWorker.register(URL.createObjectURL(blob));
            });
        }

        const steps = [
            {
                title: "The Basics",
                description: "Physical prep is the foundation of a great shot.",
                items: [
                    { icon: React.createElement(SprayCan, { className: "text-blue-500", size: 24 }), label: "Wipe your lens", detail: "Use a soft cloth to remove smudges for clear, crisp images." },
                    { icon: React.createElement(BatteryFull, { className: "text-green-500", size: 24 }), label: "Charge to 100%", detail: "Avoid your phone dying mid-shoot." }
                ]
            },
            {
                title: "File Optimization",
                description: "Make sure your phone is optimized for large files.",
                items: [
                    { icon: React.createElement(Trash2, { className: "text-red-500", size: 24 }), label: "Clear Space", detail: "Delete unnecessary files. High-res photos need room!" },
                    { icon: React.createElement(Plane, { className: "text-orange-500", size: 24 }), label: "Airplane Mode", detail: "Crucial for video! Prevents calls and notifications from ruining the take." }
                ],
                proTip: "Don't forget a tripod! Stability is the difference between a amateur and pro shot."
            },
            {
                title: "Camera Settings",
                description: "Configuring the digital 'film' for compatibility.",
                items: [
                    { icon: React.createElement(Maximize, { className: "text-purple-500", size: 24 }), label: "Max Resolution", detail: "In settings, choose the largest file size or resolution available." },
                    { icon: React.createElement(Smartphone, { className: "text-indigo-500", size: 24 }), label: "Choose JPEG", detail: "Avoid HEIC/HEIF. JPEG works everywhere and is easier to share." }
                ]
            },
            {
                title: "Taking the Shot",
                description: "Simple techniques for professional results.",
                items: [
                    { icon: React.createElement(Aperture, { className: "text-pink-500", size: 24 }), label: "Portrait Mode", detail: "Great for 1-3 people. It blurs the background for a pro look." },
                    { icon: React.createElement(Focus, { className: "text-yellow-500", size: 24 }), label: "Tap to Focus", detail: "Don't just point. Tap your subject's face on the screen to lock focus." }
                ]
            },
            {
                title: "Lighting Fixes",
                description: "Adjusting for your environment.",
                items: [
                    { icon: React.createElement(Moon, { className: "text-slate-600", size: 24 }), label: "Night Mode", detail: "If it's dim, use Night Sight. Keep the phone steady while it captures." },
                    { icon: React.createElement(CheckCircle2, { className: "text-emerald-500", size: 24 }), label: "Do a Test Shot", detail: "Review your first photo. Check lighting and background before the 'real' one." }
                ]
            }
        ];

        const App = () => {
            const [currentStep, setCurrentStep] = useState(0);
            const [completed, setCompleted] = useState(false);
            const step = steps[currentStep];

            if (completed) {
                return React.createElement('div', { className: "flex flex-col items-center justify-center min-h-screen p-6 text-center bg-white" },
                    React.createElement('div', { className: "w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center mb-6" },
                        React.createElement(CheckCircle2, { className: "text-emerald-600", size: 40 })
                    ),
                    React.createElement('h1', { className: "text-2xl font-bold text-slate-900 mb-2" }, "You're Ready!"),
                    React.createElement('p', { className: "text-slate-600 mb-8" }, "Your phone is prepped. Go capture something great."),
                    React.createElement('button', { 
                        onClick: () => { setCompleted(false); setCurrentStep(0); },
                        className: "w-full max-w-xs py-4 bg-[#0F172A] text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-transform" 
                    }, "Start Over")
                );
            }

            return React.createElement('div', { className: "flex flex-col min-h-screen text-slate-900 max-w-md mx-auto bg-[#F8FAFC]" },
                // Header
                React.createElement('header', { className: "bg-white px-6 pt-12 pb-6 sticky top-0 z-10 border-b border-slate-100" },
                    React.createElement('div', { className: "flex items-center justify-between mb-4" },
                        React.createElement('div', { className: "flex items-center gap-2" },
                            React.createElement('div', { className: "bg-[#0F172A] p-1.5 rounded-lg" }, React.createElement(Camera, { className: "text-white", size: 20 })),
                            React.createElement('span', { className: "font-bold text-lg tracking-tight" }, "DIY Pro Photo")
                        ),
                        React.createElement('span', { className: "text-[11px] font-bold text-slate-400 uppercase tracking-widest" }, `STEP ${currentStep + 1} OF 5`)
                    ),
                    React.createElement('div', { className: "h-1.5 w-full bg-slate-100 rounded-full" },
                        React.createElement('div', { className: "h-full bg-[#0F172A] rounded-full transition-all duration-500", style: { width: `${(currentStep + 1) * 20}%` } })
                    )
                ),

                // Main Content
                React.createElement('main', { className: "flex-1 p-6 pb-32" },
                    React.createElement('div', { className: "mb-8 animate-slide-in" },
                        React.createElement('h2', { className: "text-[32px] font-bold text-[#0F172A] mb-2 leading-tight" }, step.title),
                        React.createElement('p', { className: "text-[#64748B] text-lg leading-relaxed" }, step.description)
                    ),

                    React.createElement('div', { className: "space-y-4" },
                        step.items.map((item, idx) => 
                            React.createElement('div', { key: idx, className: "bg-white p-5 rounded-[24px] shadow-sm border border-slate-100 flex items-start gap-4 animate-slide-in", style: { animationDelay: `${idx * 0.1}s` } },
                                React.createElement('div', { className: "w-12 h-12 rounded-2xl bg-slate-50 flex items-center justify-center shrink-0 border border-slate-100" }, item.icon),
                                React.createElement('div', null,
                                    React.createElement('h3', { className: "font-bold text-lg text-[#0F172A]" }, item.label),
                                    React.createElement('p', { className: "text-[#64748B] leading-relaxed text-sm" }, item.detail)
                                )
                            )
                        )
                    ),

                    step.proTip && React.createElement('div', { className: "mt-8 bg-[#FFF7ED] border border-[#FFEDD5] p-5 rounded-[24px] flex gap-4 animate-slide-in", style: { animationDelay: '0.3s' } },
                        React.createElement(Plane, { className: "text-[#C2410C] shrink-0", size: 20 }),
                        React.createElement('div', null,
                            React.createElement('p', { className: "text-[11px] font-bold text-[#9A3412] uppercase tracking-wider mb-1" }, "PRO TIP"),
                            React.createElement('p', { className: "text-[#9A3412] font-medium leading-relaxed text-sm" }, step.proTip)
                        )
                    )
                ),

                // Navigation Footer
                React.createElement('footer', { className: "fixed bottom-0 left-0 right-0 p-6 bg-white/90 backdrop-blur-md flex gap-4 max-w-md mx-auto border-t border-slate-100" },
                    currentStep > 0 && React.createElement('button', { 
                        onClick: () => setCurrentStep(prev => prev - 1),
                        className: "w-14 h-14 flex items-center justify-center border border-slate-200 rounded-2xl text-slate-400 active:bg-slate-50 transition-colors"
                    }, React.createElement(ChevronLeft, { size: 24 })),
                    React.createElement('button', { 
                        onClick: () => currentStep < 4 ? setCurrentStep(prev => prev + 1) : setCompleted(true),
                        className: "flex-1 h-14 bg-[#0F172A] text-white rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg active:scale-[0.98] transition-all"
                    }, 
                        currentStep === 4 ? "Finish" : "Continue",
                        React.createElement(ChevronRight, { size: 20 })
                    )
                )
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
