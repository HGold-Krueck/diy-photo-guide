<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIY Pro Photo Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.284.0?external=react"
        }
    }
    </script>
    <style>
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-in { animation: slideIn 0.4s ease-out forwards; }
        body { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="module">
        import React, { useState } from 'react';
        import ReactDOM from 'react-dom/client';
        import { 
            Camera, BatteryFull, Trash2, Smartphone, Plane, 
            Maximize, Focus, Moon, ChevronRight, ChevronLeft, 
            CheckCircle2, Aperture, SprayCan, Sun, Frame, Eye, ShieldAlert, Layers, ZoomIn
        } from 'lucide-react';

        // --- SERVICE WORKER (OFFLINE SUPPORT) ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    const CACHE_NAME = 'diy-pro-v4';
                    const ASSETS = ['/', '/index.html', 'https://cdn.tailwindcss.com'];
                    self.addEventListener('install', (e) => e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(ASSETS))));
                    self.addEventListener('fetch', (e) => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                navigator.serviceWorker.register(URL.createObjectURL(blob));
            });
        }

        const setupSteps = [
            {
                title: "The Basics",
                description: "Physical prep is the foundation of a great shot.",
                items: [
                    { icon: React.createElement(SprayCan, { className: "text-blue-500" }), label: "Wipe your lens", detail: "Use a soft cloth to remove smudges for clear, crisp images." },
                    { icon: React.createElement(BatteryFull, { className: "text-green-500" }), label: "Charge to 100%", detail: "Avoid your phone dying mid-shoot." }
                ]
            },
            {
                title: "File Optimization",
                description: "Make sure your phone is optimized for large files.",
                items: [
                    { icon: React.createElement(Trash2, { className: "text-red-500" }), label: "Clear Space", detail: "Delete unnecessary files. High-res photos need room!" },
                    { icon: React.createElement(Plane, { className: "text-orange-500" }), label: "Airplane Mode", detail: "Crucial for video! Prevents calls and notifications from ruining the take." }
                ],
                proTip: "Don't forget a tripod! Stability is the difference between an amateur and pro shot."
            },
            {
                title: "Camera Settings",
                description: "Configuring the digital 'film' for compatibility.",
                items: [
                    { icon: React.createElement(Maximize, { className: "text-purple-500" }), label: "Max Resolution", detail: "In settings, choose the largest file size or resolution available." },
                    { icon: React.createElement(Smartphone, { className: "text-indigo-500" }), label: "Choose JPEG", detail: "Avoid HEIC/HEIF. JPEG works everywhere and is easier to share." }
                ]
            }
        ];

        const proTips = [
            {
                title: "Lighting Mastery",
                description: "Position and quality of light determine the professional look.",
                items: [
                    { icon: React.createElement(Sun, { className: "text-amber-500" }), label: "Light Position", detail: "Keep lights in front or at a slight angle. Avoid bright lights directly behind or above the subject." },
                    { icon: React.createElement(Layers, { className: "text-indigo-500" }), label: "Using a Bounce", detail: "Use white posterboard or a reflector opposite your main light to fill in harsh shadows." }
                ],
                proTip: "Indoors? Drape a lamp with a soft cloth to act as a diffuser—but be careful not to start a fire!"
            },
            {
                title: "Framing & Composition",
                description: "Compose your shot to lead the eye and stay compliant.",
                items: [
                    { icon: React.createElement(Frame, { className: "text-blue-600" }), label: "Rule of Thirds", detail: "Use your grid overlay. Line up eyes with the top left or top right intersections." },
                    { icon: React.createElement(ZoomIn, { className: "text-emerald-600" }), label: "Shoot Wide", detail: "Shoot slightly wider than you think you want. It gives room to crop for different formats." }
                ],
                proTip: "Get photos in both landscape and portrait. It's useful to have both options for print, web, and social media."
            },
            {
                title: "Security & Ethics",
                description: "Be aware of what else is in your frame.",
                items: [
                    { icon: React.createElement(ShieldAlert, { className: "text-rose-600" }), label: "Sensitive Info", detail: "Ensure no confidential data is visible. Gov employees should remove badges." },
                    { icon: React.createElement(Eye, { className: "text-slate-600" }), label: "Eyelines", detail: "Have subjects look at the camera lens, not the middle of the phone screen." }
                ],
                proTip: "Check your shot in camera! You never know what—or who—will affect your background."
            }
        ];

        const App = () => {
            const [view, setView] = useState('setup'); // 'setup' or 'tips'
            const [currentStep, setCurrentStep] = useState(0);
            const activeSteps = view === 'setup' ? setupSteps : proTips;
            const step = activeSteps[currentStep];

            const next = () => { if (currentStep < activeSteps.length - 1) setCurrentStep(prev => prev + 1); };
            const prev = () => { if (currentStep > 0) setCurrentStep(prev => prev - 1); };

            return React.createElement('div', { className: "flex flex-col min-h-screen max-w-md mx-auto bg-[#F8FAFC] shadow-2xl" },
                // --- HEADER ---
                React.createElement('header', { className: "bg-white px-6 pt-12 pb-6 border-b border-slate-100 sticky top-0 z-10" },
                    React.createElement('div', { className: "flex items-center justify-between mb-6" },
                        React.createElement('div', { className: "flex items-center gap-2" },
                            React.createElement('div', { className: "bg-[#0F172A] p-1.5 rounded-lg" }, React.createElement(Camera, { className: "text-white", size: 20 })),
                            React.createElement('span', { className: "font-bold text-lg tracking-tight" }, "DIY Pro Photo")
                        ),
                        React.createElement('span', { className: "text-[11px] font-bold text-slate-400 uppercase tracking-widest" }, `STEP ${currentStep + 1} OF ${activeSteps.length}`)
                    ),
                    // --- TAB SWITCHER ---
                    React.createElement('div', { className: "flex bg-slate-100 p-1 rounded-xl mb-4" },
                        React.createElement('button', { 
                            onClick: () => { setView('setup'); setCurrentStep(0); },
                            className: `flex-1 py-2 text-sm font-bold rounded-lg transition-all ${view === 'setup' ? 'bg-white shadow-sm text-slate-900' : 'text-slate-500'}`
                        }, "Phone Setup"),
                        React.createElement('button', { 
                            onClick: () => { setView('tips'); setCurrentStep(0); },
                            className: `flex-1 py-2 text-sm font-bold rounded-lg transition-all ${view === 'tips' ? 'bg-white shadow-sm text-slate-900' : 'text-slate-500'}`
                        }, "Scientist Tips")
                    ),
                    React.createElement('div', { className: "h-1.5 w-full bg-slate-100 rounded-full overflow-hidden" },
                        React.createElement('div', { className: "h-full bg-[#0F172A] rounded-full transition-all duration-500", style: { width: `${((currentStep + 1) / activeSteps.length) * 100}%` } })
                    )
                ),

                // --- MAIN CONTENT ---
                React.createElement('main', { className: "flex-1 p-6 pb-32" },
                    React.createElement('div', { key: `${view}-${currentStep}`, className: "animate-slide-in" },
                        React.createElement('h2', { className: "text-[32px] font-bold text-[#0F172A] mb-2 leading-tight" }, step.title),
                        React.createElement('p', { className: "text-[#64748B] text-lg mb-8 leading-relaxed" }, step.description),
                        
                        React.createElement('div', { className: "space-y-4" },
                            step.items.map((item, idx) => 
                                React.createElement('div', { key: idx, className: "bg-white p-5 rounded-[24px] border border-slate-100 shadow-sm flex gap-4" },
                                    React.createElement('div', { className: "w-12 h-12 rounded-2xl bg-slate-50 flex items-center justify-center shrink-0" }, item.icon),
                                    React.createElement('div', null,
                                        React.createElement('h3', { className: "font-bold text-lg text-[#0F172A]" }, item.label),
                                        React.createElement('p', { className: "text-[#64748B] text-sm leading-relaxed" }, item.detail)
                                    )
                                )
                            )
                        ),

                        step.proTip && React.createElement('div', { className: "mt-8 bg-[#FFF7ED] border border-[#FFEDD5] p-5 rounded-[24px] flex gap-4" },
                            React.createElement(Sun, { className: "text-[#C2410C] shrink-0", size: 20 }),
                            React.createElement('div', null,
                                React.createElement('p', { className: "text-[11px] font-bold text-[#9A3412] uppercase mb-1" }, "PRO TIP"),
                                React.createElement('p', { className: "text-[#9A3412] font-medium text-sm leading-relaxed" }, step.proTip)
                            )
                        )
                    )
                ),

                // --- FOOTER NAVIGATION ---
                React.createElement('footer', { className: "fixed bottom-0 left-0 right-0 p-6 bg-white/90 backdrop-blur-md flex gap-4 border-t max-w-md mx-auto z-20" },
                    currentStep > 0 && React.createElement('button', { 
                        onClick: prev,
                        className: "w-14 h-14 flex border border-slate-200 rounded-2xl items-center justify-center text-slate-400 active:bg-slate-50 transition-colors"
                    }, React.createElement(ChevronLeft, { size: 24 })),
                    React.createElement('button', { 
                        onClick: () => { if (currentStep < activeSteps.length - 1) next(); },
                        className: `flex-1 h-14 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg transition-all active:scale-[0.98] ${currentStep === activeSteps.length - 1 ? 'bg-emerald-600 text-white' : 'bg-[#0F172A] text-white'}`
                    }, 
                        currentStep === activeSteps.length - 1 ? "Section Complete" : "Next Step", 
                        React.createElement(ChevronRight, { size: 20 })
                    )
                )
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
